# Blueprint de Render: https://render.com/docs/blueprint-spec
# Dashboard: New → Blueprint → conectar este repo.

databases:
  - name: cnb-db
    plan: free
    databaseName: cnbdb
    user: cnb_user

services:
  - type: web
    name: cnb-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_DEBUG
        value: "0"
      - key: APP_SECRET
        generateValue: true
      - key: DEFAULT_URI
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cnb-db
          property: connectionString
